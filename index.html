<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pernikahan Hengky & Jernih</title>

<meta property="og:title" content="Undangan Pernikahan Hengky & Jernih">
<meta property="og:description" content="Kami mengundang Anda untuk hadir dalam acara pernikahan kami.">
<meta property="og:image" content="https://live.staticflickr.com/65535/55143444905_1363ba21be_b.jpg">
<meta property="og:type" content="website">

<script>
  (function(){
      // 1. Ambil parameter dari URL (misal: ?to=A/I Serlin)
      const params = new URLSearchParams(window.location.search);
      
      // 2. Kita ambil dari "to" (sesuai generator PHP) atau "nama" sebagai backup
      const namaTamu = params.get("to") || params.get("nama") || "";
      
      // 3. Alamat tujuan (Website utama Anda)
      // Gunakan encodeURIComponent agar karakter seperti "/" tetap aman saat dilempar
      const targetUrl = `https://idam.lovestoblog.com/hengky-dan-jernih/?to=${encodeURIComponent(namaTamu)}`;
      
      // 4. Eksekusi Redirect
      window.location.href = targetUrl;
  })();
</script>
</head>
<body>
    <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        <p>Sedang mengarahkan ke undangan...</p>
        <p>Jika tidak otomatis, <a id="fallback-link" href="https://idam.lovestoblog.com/hengky-dan-jernih/">klik di sini</a>.</p>
    </div>

    <script>
        // Update link manual jika redirect otomatis gagal
        const params = new URLSearchParams(window.location.search);
        const nama = params.get("to") || params.get("nama") || "";
        document.getElementById("fallback-link").href = `https://idam.lovestoblog.com/hengky-dan-jernih/?to=${encodeURIComponent(nama)}`;
    </script>
</body>
</html>
